<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="canvas-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a5c"/>
      <stop offset="100%" style="stop-color:#2d1b69"/>
    </linearGradient>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ff"/>
      <stop offset="100%" style="stop-color:#f0f"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="1200" height="48" fill="#111122" stroke="#222" stroke-width="1"/>
  <text x="16" y="30" font-family="monospace" font-size="16" font-weight="bold" fill="#a855f7">brAInstormer</text>
  <text x="150" y="30" font-family="sans-serif" font-size="14" fill="#555">Image Editor</text>
  <rect x="960" y="10" width="100" height="28" rx="6" fill="#a855f7" opacity="0.8"/>
  <text x="1010" y="28" font-family="sans-serif" font-size="12" fill="#fff" text-anchor="middle">Generate AI</text>

  <!-- Tools panel -->
  <rect x="0" y="48" width="56" height="652" fill="#111122" stroke="#222" stroke-width="1"/>
  <!-- Tool icons -->
  <rect x="8" y="60" width="40" height="40" rx="8" fill="#a855f7" opacity="0.3"/>
  <text x="28" y="85" font-family="sans-serif" font-size="18" fill="#a855f7" text-anchor="middle">↖</text>
  <text x="28" y="116" font-family="sans-serif" font-size="14" fill="#666" text-anchor="middle">✂</text>
  <text x="28" y="146" font-family="sans-serif" font-size="14" fill="#666" text-anchor="middle">⬡</text>
  <text x="28" y="176" font-family="sans-serif" font-size="14" fill="#666" text-anchor="middle">🖌</text>
  <text x="28" y="206" font-family="sans-serif" font-size="14" fill="#666" text-anchor="middle">✏</text>
  <text x="28" y="236" font-family="sans-serif" font-size="14" fill="#666" text-anchor="middle">T</text>
  <text x="28" y="266" font-family="sans-serif" font-size="14" fill="#666" text-anchor="middle">⬜</text>
  <text x="28" y="296" font-family="sans-serif" font-size="14" fill="#666" text-anchor="middle">⬤</text>
  <text x="28" y="326" font-family="sans-serif" font-size="14" fill="#666" text-anchor="middle">🔍</text>

  <!-- Main canvas area -->
  <rect x="56" y="48" width="880" height="652" fill="#1a1a2e"/>
  <!-- Canvas grid -->
  <rect x="136" y="88" width="720" height="540" fill="#252540" stroke="#333" stroke-width="1"/>
  <!-- Checkerboard pattern for canvas -->
  <defs>
    <pattern id="checker" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="10" height="10" fill="#2a2a40"/>
      <rect x="10" y="10" width="10" height="10" fill="#2a2a40"/>
    </pattern>
  </defs>
  <rect x="136" y="88" width="720" height="540" fill="url(#checker)"/>

  <!-- "Image" on canvas - cyberpunk scene mock -->
  <rect x="136" y="88" width="720" height="540" fill="url(#canvas-grad)" opacity="0.7"/>
  <!-- Neon buildings silhouette -->
  <rect x="136" y="380" width="80" height="248" fill="#0a0a1a"/>
  <rect x="200" y="320" width="60" height="308" fill="#0d0d20"/>
  <rect x="250" y="350" width="90" height="278" fill="#0a0a1a"/>
  <rect x="330" y="290" width="70" height="338" fill="#0d0d20"/>
  <rect x="390" y="340" width="100" height="288" fill="#0a0a1a"/>
  <rect x="480" y="310" width="65" height="318" fill="#0d0d20"/>
  <rect x="535" y="370" width="85" height="258" fill="#0a0a1a"/>
  <rect x="610" y="300" width="75" height="328" fill="#0d0d20"/>
  <rect x="675" y="360" width="90" height="268" fill="#0a0a1a"/>
  <rect x="755" y="330" width="101" height="298" fill="#0d0d20"/>
  <!-- Neon lights on buildings -->
  <line x1="200" y1="340" x2="260" y2="340" stroke="#0ff" stroke-width="2" opacity="0.6" filter="url(#glow2)"/>
  <line x1="390" y1="370" x2="480" y2="370" stroke="#f0f" stroke-width="2" opacity="0.6" filter="url(#glow2)"/>
  <line x1="610" y1="340" x2="680" y2="340" stroke="#0ff" stroke-width="2" opacity="0.5" filter="url(#glow2)"/>
  <!-- Sky gradient with stars -->
  <circle cx="200" cy="150" r="2" fill="#fff" opacity="0.8"/>
  <circle cx="350" cy="120" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="500" cy="100" r="2" fill="#fff" opacity="0.9"/>
  <circle cx="650" cy="140" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="750" cy="110" r="2" fill="#fff" opacity="0.8"/>
  <!-- Moon -->
  <circle cx="680" cy="160" r="40" fill="#1a1a4a"/>
  <circle cx="680" cy="160" r="38" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.7"/>
  <!-- Rain effect -->
  <line x1="180" y1="200" x2="175" y2="240" stroke="#88aaff" stroke-width="0.5" opacity="0.3"/>
  <line x1="230" y1="180" x2="225" y2="220" stroke="#88aaff" stroke-width="0.5" opacity="0.3"/>
  <line x1="400" y1="160" x2="395" y2="200" stroke="#88aaff" stroke-width="0.5" opacity="0.3"/>
  <line x1="550" y1="190" x2="545" y2="230" stroke="#88aaff" stroke-width="0.5" opacity="0.3"/>
  <line x1="700" y1="170" x2="695" y2="210" stroke="#88aaff" stroke-width="0.5" opacity="0.3"/>

  <!-- Selection box on canvas -->
  <rect x="300" y="150" width="250" height="200" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="6"/>
  <rect x="422" y="147" width="8" height="8" fill="#00d4ff"/>

  <!-- Right panel -->
  <rect x="936" y="48" width="264" height="652" fill="#111122" stroke="#222" stroke-width="1"/>

  <!-- Layers panel -->
  <text x="952" y="80" font-family="sans-serif" font-size="13" font-weight="bold" fill="#ccc">Layers</text>
  <rect x="944" y="88" width="248" height="36" rx="6" fill="#1e1e3a" stroke="#a855f7" stroke-width="1"/>
  <text x="956" y="110" font-family="sans-serif" font-size="12" fill="#fff">🔵 Neon Overlay</text>
  <rect x="944" y="128" width="248" height="36" rx="6" fill="#1e1e3a" stroke="#333" stroke-width="1"/>
  <text x="956" y="150" font-family="sans-serif" font-size="12" fill="#aaa">🏙 City Background</text>
  <rect x="944" y="168" width="248" height="36" rx="6" fill="#1e1e3a" stroke="#333" stroke-width="1"/>
  <text x="956" y="190" font-family="sans-serif" font-size="12" fill="#aaa">🌧 Rain Layer</text>
  <rect x="944" y="208" width="248" height="36" rx="6" fill="#1e1e3a" stroke="#333" stroke-width="1"/>
  <text x="956" y="230" font-family="sans-serif" font-size="12" fill="#aaa">⭐ Sky Base</text>

  <!-- Adjustments -->
  <line x1="944" y1="262" x2="1192" y2="262" stroke="#222" stroke-width="1"/>
  <text x="952" y="284" font-family="sans-serif" font-size="13" font-weight="bold" fill="#ccc">Adjustments</text>
  <!-- Sliders -->
  <text x="952" y="306" font-family="sans-serif" font-size="11" fill="#888">Brightness</text>
  <rect x="952" y="312" width="240" height="4" rx="2" fill="#333"/>
  <rect x="952" y="312" width="140" height="4" rx="2" fill="#a855f7"/>
  <circle cx="1092" cy="314" r="8" fill="#a855f7" stroke="#fff" stroke-width="1.5"/>
  <text x="952" y="340" font-family="sans-serif" font-size="11" fill="#888">Contrast</text>
  <rect x="952" y="346" width="240" height="4" rx="2" fill="#333"/>
  <rect x="952" y="346" width="160" height="4" rx="2" fill="#a855f7"/>
  <circle cx="1112" cy="348" r="8" fill="#a855f7" stroke="#fff" stroke-width="1.5"/>
  <text x="952" y="374" font-family="sans-serif" font-size="11" fill="#888">Saturation</text>
  <rect x="952" y="380" width="240" height="4" rx="2" fill="#333"/>
  <rect x="952" y="380" width="180" height="4" rx="2" fill="#a855f7"/>
  <circle cx="1132" cy="382" r="8" fill="#a855f7" stroke="#fff" stroke-width="1.5"/>

  <!-- AI Panel -->
  <line x1="944" y1="410" x2="1192" y2="410" stroke="#222" stroke-width="1"/>
  <text x="952" y="432" font-family="sans-serif" font-size="13" font-weight="bold" fill="#ccc">AI Generate</text>
  <rect x="944" y="440" width="248" height="60" rx="8" fill="#1e1e3a" stroke="#333" stroke-width="1"/>
  <text x="956" y="458" font-family="sans-serif" font-size="11" fill="#555">Describe what to generate...</text>
  <text x="956" y="476" font-family="sans-serif" font-size="10" fill="#444">cyberpunk cityscape, neon lights...</text>
  <rect x="944" y="508" width="120" height="30" rx="6" fill="#a855f7"/>
  <text x="1004" y="527" font-family="sans-serif" font-size="12" fill="#fff" text-anchor="middle">Generate</text>
  <rect x="1072" y="508" width="120" height="30" rx="6" fill="#1e1e3a" stroke="#555"/>
  <text x="1132" y="527" font-family="sans-serif" font-size="12" fill="#888" text-anchor="middle">Inpaint</text>
</svg>

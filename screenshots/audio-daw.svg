<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a15"/>
      <stop offset="100%" style="stop-color:#0d1a0d"/>
    </linearGradient>
    <linearGradient id="track1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d4a3a"/>
      <stop offset="100%" style="stop-color:#0d4a3a" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="track2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a0d3a"/>
      <stop offset="100%" style="stop-color:#4a0d3a" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="track3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a3a5c"/>
      <stop offset="100%" style="stop-color:#1a3a5c" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)"/>

  <!-- Top transport bar -->
  <rect x="0" y="0" width="1200" height="56" fill="#0d0d1a" stroke="#1a1a2e" stroke-width="1"/>
  <text x="16" y="30" font-family="monospace" font-size="16" font-weight="bold" fill="#a855f7">brAInstormer</text>
  <text x="150" y="30" font-family="sans-serif" font-size="14" fill="#555">Audio DAW</text>

  <!-- Transport controls -->
  <rect x="400" y="8" width="400" height="40" rx="8" fill="#111122" stroke="#333" stroke-width="1"/>
  <!-- |< -->
  <text x="420" y="33" font-family="sans-serif" font-size="16" fill="#888">⏮</text>
  <!-- Play -->
  <rect x="460" y="12" width="36" height="32" rx="6" fill="#22c55e" opacity="0.9"/>
  <text x="478" y="33" font-family="sans-serif" font-size="16" fill="#fff" text-anchor="middle">▶</text>
  <!-- Stop -->
  <text x="510" y="33" font-family="sans-serif" font-size="16" fill="#888">⏹</text>
  <!-- Record -->
  <rect x="540" y="12" width="36" height="32" rx="6" fill="#ef4444" opacity="0.8"/>
  <text x="558" y="33" font-family="sans-serif" font-size="16" fill="#fff" text-anchor="middle">⏺</text>
